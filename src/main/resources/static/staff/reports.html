<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Reports — Smart Compound</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">🏘️</div><h2>Smart Compound</h2><p>Staff Portal</p></div>
    <div class="sidebar-user"><div class="avatar" id="sidebarAvatar">?</div><div class="user-info"><div class="user-name" id="sidebarName">…</div><div class="user-role">Staff</div></div></div>
    <nav class="sidebar-nav">
      <a href="/staff/dashboard.html"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></a>
      <a href="/staff/residents.html"><span class="nav-icon">👥</span><span class="nav-label">Residents</span></a>
      <a href="/staff/gate-logs.html"><span class="nav-icon">🚪</span><span class="nav-label">Gate Logs</span></a>
      <a href="/staff/reports.html" class="active"><span class="nav-icon">📋</span><span class="nav-label">Issue Reports</span></a>
      <a href="/staff/service-requests.html"><span class="nav-icon">🔧</span><span class="nav-label">Service Requests</span></a>
    </nav>
    <div class="sidebar-bottom"><a onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>📋 Issue Reports</h1>
      <p>Manage reports assigned to you</p>
    </div>

    <div id="repAlert" class="alert"></div>

    <div class="section-card">
      <div class="section-card-header">
        <h2>Assigned Reports</h2>
        <button class="btn btn-outline btn-sm" onclick="loadReports()">Refresh</button>
      </div>
      <div class="section-card-body">
        <div id="reportsTable"></div>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script>
const user = requireRole('STAFF');
if (user) {
  document.getElementById('sidebarAvatar').textContent = user.fullName.charAt(0).toUpperCase();
  document.getElementById('sidebarName').textContent = user.fullName;
  loadReports();
}

async function loadReports() {
  document.getElementById('reportsTable').innerHTML = '<div class="spinner"></div>';
  const res = await apiFetch('/reports');
  const el = document.getElementById('reportsTable');
  if (!res?.success || !res.data.length) { el.innerHTML = emptyState('📋', 'No reports assigned to you yet.'); return; }
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Type</th><th>Resident</th><th>Description</th><th>Status</th><th>Submitted</th><th>Actions</th></tr></thead>
    <tbody>${res.data.map(r => `
      <tr id="report_${r.id}">
        <td><strong>${r.issueType}</strong></td>
        <td>${r.residentName}</td>
        <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.description}">${r.description}</td>
        <td id="status_${r.id}">${badge(r.status)}</td>
        <td>${fmtDate(r.createdAt)}</td>
        <td>
          ${r.status !== 'IN_PROGRESS' && r.status !== 'SOLVED'
            ? `<button class="btn btn-warning btn-sm" onclick="updateStatus(${r.id},'IN_PROGRESS')">In Progress</button>`
            : ''}
          ${r.status !== 'SOLVED'
            ? `<button class="btn btn-success btn-sm" onclick="updateStatus(${r.id},'SOLVED')">Solve</button>`
            : '<span style="color:var(--success);font-size:0.82rem;">✓ Solved</span>'}
        </td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

async function updateStatus(id, status) {
  const alert = document.getElementById('repAlert');
  const res = await apiFetch('/reports/' + id + '/status', {
    method: 'PATCH',
    body: JSON.stringify({ status }),
  });
  if (!res) return;
  if (!res.success) { showAlert(alert, res.message); return; }
  showAlert(alert, `Report status updated to ${status}`, 'success');
  loadReports();
}
</script>
</body>
</html>
