<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Smart Compound</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🏘️</div>
      <h2>Smart Compound</h2>
      <p>Resident Portal</p>
    </div>
    <div class="sidebar-user">
      <div class="avatar" id="sidebarAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebarName">Loading…</div>
        <div class="user-role">Resident</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="/resident/dashboard.html" class="active"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></a>
      <a href="/resident/buses.html"><span class="nav-icon">🚌</span><span class="nav-label">Bus Booking</span></a>
      <a href="/resident/gate.html"><span class="nav-icon">🚪</span><span class="nav-label">Gate Access</span></a>
      <a href="/resident/requests.html"><span class="nav-icon">🔧</span><span class="nav-label">Service Requests</span></a>
      <a href="/resident/reports.html"><span class="nav-icon">📋</span><span class="nav-label">Issue Reports</span></a>
    </nav>
    <div class="sidebar-bottom">
      <a onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <h1>Welcome back, <span id="welcomeName">…</span>!</h1>
      <p>Here's your compound activity summary</p>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-label">Apartment</div><div class="stat-value" id="statApartment">—</div></div>
      <div class="stat-card"><div class="stat-label">Building</div><div class="stat-value" id="statBuilding">—</div></div>
      <div class="stat-card"><div class="stat-label">My Bookings</div><div class="stat-value" id="statBookings">…</div></div>
      <div class="stat-card"><div class="stat-label">Open Reports</div><div class="stat-value" id="statReports">…</div></div>
    </div>

    <div class="card">
      <h2 style="margin-bottom:12px;">Profile Details</h2>
      <div id="profileDetails" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:0.9rem;">
        Loading…
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script>
const user = requireRole('RESIDENT');
if (user) {
  document.getElementById('sidebarAvatar').textContent = user.fullName.charAt(0).toUpperCase();
  document.getElementById('sidebarName').textContent = user.fullName;
  document.getElementById('welcomeName').textContent = user.fullName.split(' ')[0];
  document.getElementById('statApartment').textContent = user.apartmentNum || '—';
  document.getElementById('statBuilding').textContent  = user.buildingNum  || '—';

  document.getElementById('profileDetails').innerHTML = `
    <div><strong>Full Name:</strong> ${user.fullName}</div>
    <div><strong>Username:</strong> ${user.username}</div>
    <div><strong>Email:</strong> ${user.email}</div>
    <div><strong>Phone:</strong> ${user.phone}</div>
    <div><strong>National ID:</strong> ${user.nationalId}</div>
    <div><strong>Age:</strong> ${user.age}</div>
    <div><strong>Dependants:</strong> ${user.dependants || '—'}</div>
    <div><strong>Member since:</strong> ${fmtDate(user.createdAt)}</div>
  `;

  // Load stats
  apiFetch('/buses/bookings/my').then(r => {
    document.getElementById('statBookings').textContent = r?.data?.length ?? '0';
  });
  apiFetch('/reports/my').then(r => {
    const open = (r?.data || []).filter(x => x.status !== 'SOLVED').length;
    document.getElementById('statReports').textContent = open;
  });
}
</script>
</body>
</html>
